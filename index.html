<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>Тренажёр реакции</h1>
        <div class="subtitle">Karate reaction trainer</div>

            <small>Красные</small>
            <strong id="red">0</strong>
          </div>
          <div class="stat">
            <small>Синие</small>
            <strong id="blue">0</strong>

      </div>
    </header>

      <div class="circle" id="circle">

        </div>

        <button id="resetBtn">Сброс</button>

      </div>

      <div class="settings">
        <select id="speedSelect">
          <option value="slow">Медленно</option>
          <option value="normal" selected>Нормально</option>
          <option value="fast">Быстро</option>
          <option value="extreme">Экстремально</option>
        </select>

        <select id="durationSelect">
          <option value="30">30 секунд</option>
          <option value="60" selected>1 минута</option>
          <option value="120">2 минуты</option>
          <option value="180">3 минуты</option>
          <option value="300">5 минут</option>
        </select>

        <label>
          <input type="checkbox" id="seriesToggle" checked />
          Случайные серии
        </label>
      </div>

          <small>Красные</small>
          <strong id="resultRed">0</strong>

        <div class="stat">
          <small>Синие</small>
          <strong id="resultBlue">0</strong>
        </div>
        <div class="stat">
          <small>В минуту</small>
          <strong id="resultPace">0.0</strong>
        </div>

  <script>
    const circle = document.getElementById("circle");
    const circleText = document.getElementById("circleText");
    const circleSub = document.getElementById("circleSub");

    const totalEl = document.getElementById("total");
    const redEl = document.getElementById("red");
    const blueEl = document.getElementById("blue");
    const paceEl = document.getElementById("pace");
    const timerEl = document.getElementById("timer");
    const stateEl = document.getElementById("state");

    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    const speedSelect = document.getElementById("speedSelect");
    const durationSelect = document.getElementById("durationSelect");
    const seriesToggle = document.getElementById("seriesToggle");

    const result = document.getElementById("result");
    const resultTitle = document.getElementById("resultTitle");
    const resultTotal = document.getElementById("resultTotal");
    const resultRed = document.getElementById("resultRed");
    const resultBlue = document.getElementById("resultBlue");
    const resultPace = document.getElementById("resultPace");

    const SPEEDS = {
      slow: { min: 1600, max: 4200 },
      normal: { min: 500, max: 3000 },
      fast: { min: 320, max: 1350 },
      extreme: { min: 180, max: 780 }
    };

    const COLOR_DURATION = 600;

    let phase = "idle";
    let delayTimer = null;
    let colorTimer = null;
    let clockTimer = null;

    let endTime = 0;
    let remainingMs = 60000;
    let startedAt = 0;
    let activeMs = 0;

    let total = 0;
    let red = 0;
    let blue = 0;
    let lastColor = null;
    let audioCtx = null;

    function random(min, max) {
      return Math.floor(min + Math.random() * (max - min + 1));
    }

    function durationMs() {
      return Number(durationSelect.value) * 1000;
    }

    function formatTime(ms) {
      const seconds = Math.ceil(Math.max(0, ms) / 1000);
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function ensureAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      if (!audioCtx) {
        audioCtx = new AudioContext();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function beep(color) {
      if (!audioCtx) return;

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(color === "red" ? 520 : 760, now);

      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(0.22, now + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.13);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.14);
    }

    function setCircle(mode) {
      circle.className = "circle";

      if (mode === "red") {
        circle.classList.add("red");
        circleText.firstChild.nodeValue = "Левая";
        circleSub.textContent = "Красный сигнал";
        return;
      }

      if (mode === "blue") {
        circle.classList.add("blue");
        circleText.firstChild.nodeValue = "Правая";
        circleSub.textContent = "Синий сигнал";
        return;
      }

      if (phase === "running") {
        circleText.firstChild.nodeValue = "Ждите";
        circleSub.textContent = "Следующая команда";
      } else if (phase === "paused") {
        circleText.firstChild.nodeValue = "Пауза";
        circleSub.textContent = "Старт продолжит";
      } else {
        circleText.firstChild.nodeValue = "Готов";
        circleSub.textContent = "Нажмите старт";
      }
    }

    function chooseColor() {
      if (!seriesToggle.checked || !lastColor) {
        return Math.random() < 0.5 ? "red" : "blue";
      }

      const roll = Math.random();

      if (roll < 0.36) {
        return lastColor;
      }

      if (roll < 0.56) {
        return lastColor === "red" ? "blue" : "red";
      }

      return Math.random() < 0.5 ? "red" : "blue";
    }

    function updateStats() {
      totalEl.textContent = total;
      redEl.textContent = red;
      blueEl.textContent = blue;

      const elapsed = phase === "running"
        ? activeMs + Date.now() - startedAt
        : activeMs;

      paceEl.textContent = elapsed > 0
        ? (total / (elapsed / 60000)).toFixed(1)
        : "0.0";
    }

    function updateClock() {
      if (phase === "running") {
        remainingMs = endTime - Date.now();

        if (remainingMs <= 0) {
          finish("Готово");
          return;
        }
      }

      timerEl.textContent = formatTime(remainingMs);
      updateStats();
    }

    function clearAllTimers() {
      clearTimeout(delayTimer);
      clearTimeout(colorTimer);
      clearInterval(clockTimer);
    }

    function scheduleNext() {
      if (phase !== "running") return;

      setCircle("gray");

      const speed = SPEEDS[speedSelect.value];
      const delay = random(speed.min, speed.max);

      delayTimer = setTimeout(showCommand, delay);
    }

    function showCommand() {
      if (phase !== "running") return;

      const color = chooseColor();

      lastColor = color;
      total++;

      if (color === "red") red++;
      if (color === "blue") blue++;

      setCircle(color);
      beep(color);
      updateStats();

      colorTimer = setTimeout(() => {
        if (phase !== "running") return;
        setCircle("gray");
        scheduleNext();
      }, COLOR_DURATION);
    }

    function start() {
      ensureAudio();
      result.classList.remove("show");

      if (phase === "running") return;

      if (phase === "paused") {
        phase = "running";
        startedAt = Date.now();
        endTime = Date.now() + remainingMs;
        stateEl.textContent = "Тренировка";
        clockTimer = setInterval(updateClock, 200);
        scheduleNext();
        updateClock();
        return;
      }

      phase = "running";
      total = 0;
      red = 0;
      blue = 0;
      lastColor = null;
      activeMs = 0;
      startedAt = Date.now();
      remainingMs = durationMs();
      endTime = Date.now() + remainingMs;

      stateEl.textContent = "Тренировка";
      setCircle("gray");
      updateStats();
      updateClock();

      clockTimer = setInterval(updateClock, 200);
      scheduleNext();
    }

    function pause() {
      if (phase !== "running") return;

      clearAllTimers();
      activeMs += Date.now() - startedAt;
      remainingMs = Math.max(0, endTime - Date.now());
      phase = "paused";
      stateEl.textContent = "Пауза";
      setCircle("gray");
      updateClock();
    }

    function stop() {
      if (phase === "idle") return;
      finish("Остановлено");
    }

    function reset() {
      clearAllTimers();

      phase = "idle";
      total = 0;
      red = 0;
      blue = 0;
      lastColor = null;
      activeMs = 0;
      remainingMs = durationMs();

      stateEl.textContent = "Ожидание";
      result.classList.remove("show");

      setCircle("gray");
      updateClock();
    }

    function finish(title) {
      clearAllTimers();

      if (phase === "running") {
        activeMs += Math.max(0, Date.now() - startedAt);
      }

      phase = "finished";
      remainingMs = 0;
      stateEl.textContent = title;
      timerEl.textContent = "00:00";

      setCircle("gray");
      showResult(title);
      updateStats();
    }

    function showResult(title) {
      const planned = durationMs();
      const measured = Math.max(1000, Math.min(planned, activeMs || planned));
      const average = total / (measured / 60000);

      resultTitle.textContent = title === "Готово"
        ? "Итог тренировки"
        : "Тренировка остановлена";

      resultTotal.textContent = total;
      resultRed.textContent = red;
      resultBlue.textContent = blue;
      resultPace.textContent = average.toFixed(1);

      result.classList.add("show");
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    startBtn.addEventListener("click", start);
    pauseBtn.addEventListener("click", pause);
    stopBtn.addEventListener("click", stop);
    resetBtn.addEventListener("click", reset);
    fullscreenBtn.addEventListener("click", toggleFullscreen);

    durationSelect.addEventListener("change", () => {
      if (phase === "idle" || phase === "finished") {
        remainingMs = durationMs();
        updateClock();
      }
    });

    speedSelect.addEventListener("change", () => {
      if (phase === "running") {
        clearTimeout(delayTimer);
        clearTimeout(colorTimer);
        scheduleNext();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && phase === "running") {
        pause();
      }
    });

    reset();
  </script>
</body>
</html>
